<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2C3A5B"/>
      <stop offset="1" stop-color="#18203A"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.25" cy="0.18" r="0.9">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="spine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#EA9A5E"/>
      <stop offset="1" stop-color="#D5772F"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>

  <!-- tile background -->
  <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#tile)"/>
  <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#glow)"/>

  <g filter="url(#soft)">
    <!-- back sheet (depth) -->
    <rect x="156" y="112" width="208" height="320" rx="16" fill="#D9C9A6"/>
    <!-- front cover -->
    <rect x="140" y="96" width="208" height="320" rx="16" fill="#F5EEDF"/>
  </g>

  <!-- bound spine -->
  <path d="M156 96 H174 V416 H156 A16 16 0 0 1 140 400 V112 A16 16 0 0 1 156 96 Z" fill="url(#spine)"/>
  <circle cx="157" cy="170" r="7" fill="#F5EEDF"/>
  <circle cx="157" cy="256" r="7" fill="#F5EEDF"/>
  <circle cx="157" cy="342" r="7" fill="#F5EEDF"/>

  <!-- title bars -->
  <rect x="192" y="126" width="118" height="12" rx="6" fill="#2E3B5B"/>
  <rect x="192" y="148" width="84" height="12" rx="6" fill="#96A0B8"/>
  <rect x="192" y="176" width="140" height="3" rx="1.5" fill="#E4DAC3"/>

  <!-- appliance diagram (home-appliance manual) -->
  <rect x="216" y="196" width="94" height="70" rx="11" fill="#FFFFFF" stroke="#2E3B5B" stroke-width="4"/>
  <circle cx="230" cy="212" r="4" fill="#D5772F"/>
  <circle cx="244" cy="212" r="4" fill="#D5772F"/>
  <circle cx="272" cy="237" r="20" fill="#E7EEF3" stroke="#2E3B5B" stroke-width="4"/>
  <circle cx="272" cy="237" r="6" fill="#2E3B5B"/>
  <rect x="224" y="266" width="11" height="7" rx="2" fill="#2E3B5B"/>
  <rect x="291" y="266" width="11" height="7" rx="2" fill="#2E3B5B"/>

  <!-- numbered steps -->
  <circle cx="202" cy="300" r="13" fill="#D5772F"/>
  <text x="202" y="301" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle" dominant-baseline="central">1</text>
  <rect x="224" y="294" width="104" height="11" rx="5.5" fill="#CBC1A8"/>

  <circle cx="202" cy="336" r="13" fill="#D5772F"/>
  <text x="202" y="337" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle" dominant-baseline="central">2</text>
  <rect x="224" y="330" width="86" height="11" rx="5.5" fill="#CBC1A8"/>

  <circle cx="202" cy="372" r="13" fill="#D5772F"/>
  <text x="202" y="373" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle" dominant-baseline="central">3</text>
  <rect x="224" y="366" width="98" height="11" rx="5.5" fill="#CBC1A8"/>

  <!-- footer hint line -->
  <rect x="192" y="398" width="120" height="7" rx="3.5" fill="#DCD2BB"/>
</svg>
