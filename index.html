<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <!-- iPad standalone PWA。ユーザースケール許可（ビューア内ピンチも活かす）。viewport-fit=cover でノッチ回避余白を取る -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5.0"
    />
    <meta name="theme-color" content="#0b0f14" />
    <meta name="color-scheme" content="dark" />
    <!-- iOS ホーム画面PWA設定 -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="マニュアル" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon-180.png" />
    <title>マニュアル検索</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
